<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ودعة - بطاقة تهنئة عيد الفطر المبارك</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-wrapper">

    <!-- Header -->
    <header class="header">
      <img src="wida-logo.png" class="logo" alt="wida">
      <div class="decorative-dots">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <h1 class="page-title">بطاقة تهنئة عيد الفطر</h1>
      <p class="page-subtitle">اختر التصميم المناسب وأدخل اسمك</p>
    </header>

    <!-- Step 1 -->
    <div id="step1" class="step active">
      <section class="templates-section">
        <h2 class="section-label">اختر تصميمك</h2>
        <div class="templates-grid">
          <div class="template-card selected" data-template="wida-one" onclick="selectTemplate('wida-one')">
            <div class="card-check">✓</div>
            <img id="img-wida-one" src="wida-new-card-design-one.jpeg" alt="التصميم الأول">
            <div class="card-label">التصميم الأول</div>
          </div>
          <div class="template-card" data-template="wida-two" onclick="selectTemplate('wida-two')">
            <div class="card-check">✓</div>
            <img id="img-wida-two" src="wida-new-card-design-two.jpeg" alt="التصميم الثاني">
            <div class="card-label">التصميم الثاني</div>
          </div>
        </div>
      </section>

      <section class="input-section">
        <label class="input-label" for="name-input">أدخل اسمك</label>
        <div class="input-wrapper">
          <input id="name-input" class="name-input" type="text" placeholder="اكتب اسمك هنا...">
        </div>
        <button class="btn btn-primary" onclick="generateCard()">
          <span>✨</span> إنشاء البطاقة
        </button>
      </section>
    </div>

    <!-- Step 2 -->
    <div id="step2" class="step">
      <div class="result-container">
        <div class="canvas-wrapper">
          <canvas id="result-canvas"></canvas>
        </div>
        <div class="result-actions">
          <button class="btn btn-secondary" onclick="goBack()">
            ← رجوع
          </button>
          <button class="btn btn-primary" onclick="downloadCard()">
            ⬇ تحميل البطاقة
          </button>
        </div>
      </div>
    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
