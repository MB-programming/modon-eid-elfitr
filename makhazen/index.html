<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مخازن العناية - بطاقة تهنئة عيد الفطر</title>
    <link rel="preload" href="ArbFONTS-PNU-Light.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="logob.webp" as="image">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">

        <!-- ══ HEADER ══ -->
        <div class="header">
            <img src="logob.webp" class="logo" alt="مخازن العناية">

            <div class="eid-deco" aria-hidden="true">
                <svg class="eid-crescent" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
                    <path d="M38 10 A20 20 0 1 0 38 50 A14 14 0 1 1 38 10Z" fill="currentColor"/>
                    <polygon points="47,18 48.5,23 53.5,23 49.5,26 51,31 47,28 43,31 44.5,26 40.5,23 45.5,23" fill="currentColor"/>
                </svg>
                <span class="eid-dots">
                    <span></span><span></span><span></span>
                    <span></span><span></span>
                </span>
                <svg class="eid-crescent eid-crescent--flip" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
                    <path d="M38 10 A20 20 0 1 0 38 50 A14 14 0 1 1 38 10Z" fill="currentColor"/>
                    <polygon points="47,18 48.5,23 53.5,23 49.5,26 51,31 47,28 43,31 44.5,26 40.5,23 45.5,23" fill="currentColor"/>
                </svg>
            </div>

            <h1 class="title">بطاقة تهنئة عيد الفطر المبارك 1446هـ</h1>
            <p class="subtitle">أدخل اسمك للحصول على بطاقة التهنئة الخاصة بك</p>
        </div>

        <!-- ══ STEPS ══ -->
        <div class="steps-container">

            <!-- Step 1: Name input -->
            <div class="step active" id="step1">
                <h2 class="step-title">اكتب اسمك</h2>

                <div class="name-input-group">
                    <label for="name-input">الاسم</label>
                    <input
                        type="text"
                        id="name-input"
                        class="name-input"
                        placeholder="مثال: محمد العمري"
                        autocomplete="off"
                        dir="rtl"
                        autofocus
                    >
                </div>

                <button class="btn btn-primary" onclick="generateCard()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                    إنشاء البطاقة
                </button>
            </div>

            <!-- Step 2: Result -->
            <div class="step" id="step2">
                <h2 class="step-title">بطاقتك جاهزة!</h2>

                <div class="result-container">
                    <div class="canvas-wrapper">
                        <canvas id="result-canvas"></canvas>
                    </div>

                    <div class="buttons-row">
                        <button class="btn btn-secondary" onclick="goBack()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                            </svg>
                            رجوع
                        </button>
                        <button class="btn btn-primary" onclick="downloadCard()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M19 12v7H5v-7H3v7c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2zm-6 .67l2.59-2.58L17 11.5l-5 5-5-5 1.41-1.41L11 12.67V3h2z"/>
                            </svg>
                            تحميل البطاقة
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Hidden card image used by canvas -->
    <img id="card-img" src="cardeid.webp" alt="" crossorigin="anonymous" style="display:none">

    <script src="script.js?v=5"></script>
</body>
</html>
