<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مخازن العناية - بطاقة تهنئة عيد الفطر</title>
    <link rel="preload" href="ArbFONTS-PNU-Light.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="logob.webp" as="image">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Decorative patterns background -->
    <div class="bg-pattern" aria-hidden="true">
        <img src="pattern-1.webp" class="pat pat-1" alt="" loading="lazy">
        <img src="pattern-2.webp" class="pat pat-2" alt="" loading="lazy">
        <img src="pattern-3.webp" class="pat pat-3" alt="" loading="lazy">
        <img src="pattern-4.webp" class="pat pat-4" alt="" loading="lazy">
        <img src="pattern-5.webp" class="pat pat-5" alt="" loading="lazy">
        <img src="pattern-6.webp" class="pat pat-6" alt="" loading="lazy">
    </div>

    <!-- Decorative crescents / stars (CSS only, no emoji) -->
    <div class="deco deco-crescent deco-c1" aria-hidden="true"></div>
    <div class="deco deco-crescent deco-c2" aria-hidden="true"></div>
    <div class="deco deco-star deco-s1" aria-hidden="true"></div>
    <div class="deco deco-star deco-s2" aria-hidden="true"></div>
    <div class="deco deco-star deco-s3" aria-hidden="true"></div>

    <div class="container">

        <!-- ══ HEADER ══ -->
        <header class="header">
            <img src="logob.webp" class="logo" alt="مخازن العناية">
            <h1 class="title">بطاقة تهنئة عيد الفطر</h1>
            <p class="subtitle">اكتب اسمك وحمّل بطاقتك الخاصة</p>
        </header>

        <!-- ══ STEP 1 : اختر الاسم ══ -->
        <div class="steps-container" id="step1">

            <div class="step active">
                <h2 class="step-title">ادخل اسمك</h2>

                <div class="name-input-group">
                    <label for="name-input">الاسم</label>
                    <input
                        id="name-input"
                        class="name-input"
                        type="text"
                        placeholder="مثال: محمد العمري"
                        autocomplete="off"
                        dir="rtl"
                    >
                </div>

                <div class="cache-row">
                    <button class="btn btn-primary" onclick="generateCard()">توليد البطاقة</button>
                    <button class="btn btn-secondary" onclick="clearImageCache()">تحديث الصورة</button>
                </div>
            </div>

        </div>

        <!-- ══ STEP 2 : النتيجة (modal) ══ -->
        <div id="result-modal" class="result-modal" role="dialog" aria-modal="true" aria-label="بطاقتك جاهزة">
            <div class="result-modal-inner">
                <button class="modal-close" onclick="goBack()" aria-label="إغلاق">&#x2715;</button>
                <h2 class="step-title">بطاقتك جاهزة</h2>
                <canvas id="result-canvas" class="result-canvas"></canvas>
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="downloadCard()">تحميل البطاقة</button>
                    <button class="btn btn-secondary" onclick="goBack()">رجوع</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Hidden card image used by canvas -->
    <img id="card-img" src="cardeid.webp" alt="" crossorigin="anonymous" style="display:none">

    <script src="script.js?v=2"></script>
</body>
</html>
